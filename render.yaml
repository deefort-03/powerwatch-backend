services:
  - type: web
    name: powerwatch-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: powerwatch-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SENSOR_API_KEY
        value: powerwatch-iot-key
      - key: OVERRIDE_API_KEY
        value: powerwatch-override-key

databases:
  - name: powerwatch-db
    databaseName: powerwatch
    plan: free
